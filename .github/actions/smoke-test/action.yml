name: 'Refinery Smoke Test'
description: 'Runs smoke tests for refinery using Docker'
inputs:
  refinery_bin:
    description: 'Path to refinery binary'
    required: true
  filter:
    description: 'OS filter'
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Build Docker image
      shell: bash
      run: |
        docker build -t refinery-smoke-test -f tests/smoke/Dockerfile . > /dev/null 2>&1

    - name: Run Smoke Test in Docker
      shell: bash
      run: |
        chmod +x ${{ inputs.refinery_bin }}
        docker run --rm -v $(pwd):/app -w /app refinery-smoke-test make smoke-test-local
